# CI Badge: ![CI](https://github.com/<org>/<repo>/actions/workflows/ci.yml/badge.svg)
# Add to README.md once the repo is on GitHub

name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript type check ────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  # ── ESLint (non-blocking until .eslintrc is configured) ──────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # TODO: remove continue-on-error once ESLint is fully configured
      - run: npm run lint
        continue-on-error: true

  # ── Unit tests (non-blocking until tests are written) ────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # TODO: remove continue-on-error once unit tests are added
      - run: npm run test:unit
        continue-on-error: true

  # ── Playwright smoke (only when spec files exist) ────────────────────────────
  # NOTE: The full AI pipeline (npm run ai:run) is NOT run in CI — it requires
  # LLM API keys and can take 10+ minutes. Run it locally or on a dedicated
  # AI generation environment with the required secrets.
  playwright-smoke:
    name: Playwright Smoke
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      LLM_CACHE: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # Only install browsers if spec files exist (avoids 300MB download on empty repo)
      - name: Check for spec files
        id: specs
        run: |
          count=$(find tests/e2e -name "*.spec.ts" 2>/dev/null | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Found $count spec files"
      - name: Install Playwright browsers
        if: steps.specs.outputs.count > 0
        run: npx playwright install chromium --with-deps
      - name: Run smoke tests
        if: steps.specs.outputs.count > 0
        run: npx playwright test --project=chromium --grep @smoke
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN_MODELS }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      - name: Upload playwright report
        if: steps.specs.outputs.count > 0 && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
